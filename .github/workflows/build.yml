name: Deploy MuleSoft Application to Anypoint Platform

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ANYPOINT_ORG: 9316d463-75eb-4e74-955d-f242165464ce
  ANYPOINT_ENV: Sandbox
  APP_NAME: mulesoft-cicd-sample
  APP_RUNTIME: 4.7.4
  TARGET_NAME: Cloudhub-US-East-2
  GROUP_ID: 9316d463-75eb-4e74-955d-f242165464ce
  ARTIFACT_ID: mulesoft-cicd-sample
  VERSION: 1.0.0-SNAPSHOT

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ANYPOINT_REPO_PASSWORD: ${{ secrets.CONNECTED_APP_CLIENT_ID }}~?~${{ secrets.CONNECTED_APP_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven settings for Anypoint Exchange
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS_EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>ANYPOINT_REPO_PASSWORD_PLACEHOLDER</password>
              </server>
              <server>
                <id>anypoint-exchange-v2</id>
                <username>~~~Client~~~</username>
                <password>ANYPOINT_REPO_PASSWORD_PLACEHOLDER</password>
              </server>
              <server>
                <id>mulesoft-releases</id>
                <username>~~~Client~~~</username>
                <password>ANYPOINT_REPO_PASSWORD_PLACEHOLDER</password>
              </server>
            </servers>
          </settings>
          SETTINGS_EOF
          # Replace placeholder with actual credentials
          sed -i "s|ANYPOINT_REPO_PASSWORD_PLACEHOLDER|${ANYPOINT_REPO_PASSWORD}|g" ~/.m2/settings.xml

      - name: Build and publish Mule application to Anypoint Exchange
        run: mvn clean deploy -DskipTests --no-transfer-progress

      - name: Deploy to CloudHub 2.0 via REST API
        env:
          ANYPOINT_CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          # Get access token
          echo "Getting access token..."
          ACCESS_TOKEN=$(curl -sf -X POST "https://anypoint.mulesoft.com/accounts/api/v2/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${ANYPOINT_CLIENT_ID}&client_secret=${ANYPOINT_CLIENT_SECRET}" \
            | jq -r '.access_token')
          echo "Access token obtained"

          # Get environment ID
          echo "Getting environment ID..."
          ENV_ID=$(curl -sf "https://anypoint.mulesoft.com/accounts/api/organizations/${{ env.ANYPOINT_ORG }}/environments" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            | jq -r --arg env "${{ env.ANYPOINT_ENV }}" '.data[] | select(.name==$env) | .id')
          echo "Environment ID: ${ENV_ID}"

          # Get target ID
          echo "Getting target ID..."
          TARGET_ID=$(curl -sf "https://anypoint.mulesoft.com/runtimefabric/api/organizations/${{ env.ANYPOINT_ORG }}/targets" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            | jq -r --arg target "${{ env.TARGET_NAME }}" '.[] | select(.name==$target) | .id')
          echo "Target ID: ${TARGET_ID}"

          # Get the exact runtime version string supported by this target (e.g. "4.7.4:1e")
          echo "Getting supported runtime versions for target..."
          RUNTIMES_RAW=$(curl -sf "https://anypoint.mulesoft.com/runtimefabric/api/organizations/${{ env.ANYPOINT_ORG }}/targets/${TARGET_ID}/runtimes" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}")
          echo "Raw runtimes response: ${RUNTIMES_RAW}"

          # Try field name 'version' first, then 'runtimeVersion', then 'tag'
          RUNTIME_VERSION=$(echo "${RUNTIMES_RAW}" | jq -r --arg base "${{ env.APP_RUNTIME }}" \
            '[
              if type == "array" then .[]
              elif .data then .data[]
              elif .runtimes then .runtimes[]
              else error("unknown shape")
              end
              | (.version // .runtimeVersion // .tag // "")
              | select(startswith($base))
            ] | sort | last // empty')
          echo "Resolved runtime version: ${RUNTIME_VERSION}"

          # Fallback: try the Application Manager targets runtimes endpoint
          if [ -z "${RUNTIME_VERSION}" ] || [ "${RUNTIME_VERSION}" = "null" ]; then
            echo "Trying Application Manager runtimes endpoint..."
            RUNTIMES_RAW2=$(curl -sf "https://anypoint.mulesoft.com/amc/application-manager/api/v2/organizations/${{ env.ANYPOINT_ORG }}/targets/${TARGET_ID}/runtimes" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" 2>/dev/null || echo "{}")
            echo "AMC runtimes response: ${RUNTIMES_RAW2}"
            RUNTIME_VERSION=$(echo "${RUNTIMES_RAW2}" | jq -r --arg base "${{ env.APP_RUNTIME }}" \
              '[
                if type == "array" then .[]
                elif .data then .data[]
                elif .runtimes then .runtimes[]
                else empty
                end
                | (.version // .runtimeVersion // .tag // "")
                | select(startswith($base))
              ] | sort | last // empty')
            echo "Resolved runtime version (AMC): ${RUNTIME_VERSION}"
          fi

          # Also print full target info to help diagnose if still failing
          if [ -z "${RUNTIME_VERSION}" ] || [ "${RUNTIME_VERSION}" = "null" ]; then
            echo "Dumping full target info for diagnosis..."
            curl -sf "https://anypoint.mulesoft.com/runtimefabric/api/organizations/${{ env.ANYPOINT_ORG }}/targets" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              | jq --arg target "${{ env.TARGET_NAME }}" '.[] | select(.name==$target)'
            echo "ERROR: Could not find a supported runtime version matching ${{ env.APP_RUNTIME }} on target ${TARGET_ID}"
            exit 1
          fi

          # Build deployment config referencing Exchange artifact (no file upload)
          DEPLOY_CONFIG=$(jq -n \
            --arg name "${{ env.APP_NAME }}" \
            --arg targetId "${TARGET_ID}" \
            --arg runtime "${RUNTIME_VERSION}" \
            --arg groupId "${{ env.GROUP_ID }}" \
            --arg artifactId "${{ env.ARTIFACT_ID }}" \
            --arg version "${{ env.VERSION }}" \
            '{
              name: $name,
              labels: [],
              target: {
                provider: "MC",
                targetId: $targetId,
                deploymentSettings: {
                  runtimeVersion: $runtime,
                  lastMileSecurity: false,
                  persistentObjectStore: false,
                  updateStrategy: "rolling",
                  clustering: false,
                  enforceDeployingReplicasAcrossNodes: false,
                  http: { inbound: { lastMileSecurity: false, forwardSslSession: false } },
                  jvm: {},
                  resources: {
                    cpu: { reserved: "100m", limit: "500m" },
                    memory: { reserved: "700Mi", limit: "700Mi" }
                  }
                },
                replicas: 1
              },
              application: {
                ref: {
                  groupId: $groupId,
                  artifactId: $artifactId,
                  version: $version,
                  packaging: "jar"
                },
                desiredState: "STARTED",
                configuration: {
                  "mule.agent.application.properties.service": {
                    applicationName: $name,
                    properties: {},
                    secureProperties: {}
                  },
                  "mule.agent.logging.service": {
                    artifactName: $name,
                    scopeLoggingConfigurations: []
                  }
                },
                integrations: {
                  services: { objectStoreV2: { enabled: false } }
                }
              }
            }')

          # Check if deployment already exists
          echo "Checking for existing deployment..."
          EXISTING_ID=$(curl -sf "https://anypoint.mulesoft.com/amc/application-manager/api/v2/organizations/${{ env.ANYPOINT_ORG }}/environments/${ENV_ID}/deployments" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            | jq -r --arg name "${{ env.APP_NAME }}" '.items[] | select(.name==$name) | .id // empty')

          if [ -n "${EXISTING_ID}" ]; then
            echo "Updating existing deployment: ${EXISTING_ID}"
            HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" -X PATCH \
              "https://anypoint.mulesoft.com/amc/application-manager/api/v2/organizations/${{ env.ANYPOINT_ORG }}/environments/${ENV_ID}/deployments/${EXISTING_ID}" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${DEPLOY_CONFIG}")
          else
            echo "Creating new deployment..."
            HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" -X POST \
              "https://anypoint.mulesoft.com/amc/application-manager/api/v2/organizations/${{ env.ANYPOINT_ORG }}/environments/${ENV_ID}/deployments" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${DEPLOY_CONFIG}")
          fi

          echo "HTTP Status: ${HTTP_CODE}"
          echo "Response:"
          cat response.json | jq . 2>/dev/null || cat response.json

          if [[ "${HTTP_CODE}" -ge 200 && "${HTTP_CODE}" -lt 300 ]]; then
            echo "Deployment initiated successfully!"
          else
            echo "Deployment failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
