name: Deploy MuleSoft Application to Anypoint Platform

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ANYPOINT_ORG: 9316d463-75eb-4e74-955d-f242165464ce
  ANYPOINT_ENV: Sandbox
  APP_NAME: mulesoft-cicd-sample
  APP_RUNTIME: 4.7.4
  TARGET: Cloudhub-US-East-2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ANYPOINT_REPO_PASSWORD: ${{ secrets.CONNECTED_APP_CLIENT_ID }}~?~${{ secrets.CONNECTED_APP_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven settings for Anypoint Exchange
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>${ANYPOINT_REPO_PASSWORD}</password>
              </server>
              <server>
                <id>anypoint-exchange-v2</id>
                <username>~~~Client~~~</username>
                <password>${ANYPOINT_REPO_PASSWORD}</password>
              </server>
              <server>
                <id>mulesoft-releases</id>
                <username>~~~Client~~~</username>
                <password>${ANYPOINT_REPO_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build Mule application
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Install Anypoint CLI
        run: npm install -g anypoint-cli-v4

      - name: Deploy to CloudHub 2.0
        env:
          ANYPOINT_CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          JAR=$(ls target/*-mule-application.jar)
          anypoint-cli-v4 runtime-mgr cloudhub2-application deploy \
            --organization ${{ env.ANYPOINT_ORG }} \
            --environment ${{ env.ANYPOINT_ENV }} \
            --runtime ${{ env.APP_RUNTIME }} \
            --replicas 1 \
            --vCores 0.1 \
            --provider MC \
            --target ${{ env.TARGET }} \
            ${{ env.APP_NAME }} \
            $JAR
