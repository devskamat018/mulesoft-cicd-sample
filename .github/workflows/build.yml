name: Deploy MuleSoft Application to Anypoint Platform

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ANYPOINT_ORG: a164d45a-438d-4e92-b440-0bb72eeadf5d
  ANYPOINT_ENV: Sandbox

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ANYPOINT_REPO_PASSWORD: ${{ secrets.CONNECTED_APP_CLIENT_ID }}~?~${{ secrets.CONNECTED_APP_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven settings for Anypoint Exchange
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>${env.ANYPOINT_REPO_PASSWORD}</password>
              </server>
              <server>
                <id>anypoint-exchange-v2</id>
                <username>~~~Client~~~</username>
                <password>${env.ANYPOINT_REPO_PASSWORD}</password>
              </server>
              <server>
                <id>mulesoft-releases</id>
                <username>~~~Client~~~</username>
                <password>${env.ANYPOINT_REPO_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build Mule application
        run: mvn clean package --no-transfer-progress -DskipTests

      - name: Deploy to Anypoint Platform (CloudHub)
        run: |
          mvn deploy -DmuleDeploy \
            -Danypoint.client.id="${{ secrets.CONNECTED_APP_CLIENT_ID }}" \
            -Danypoint.client.secret="${{ secrets.CONNECTED_APP_CLIENT_SECRET }}" \
            -Danypoint.org="${{ env.ANYPOINT_ORG }}" \
            -Danypoint.env="${{ env.ANYPOINT_ENV }}" \
            --no-transfer-progress
