name: Deploy MuleSoft Application to Anypoint Platform

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ANYPOINT_ORG: 9316d463-75eb-4e74-955d-f242165464ce
  ANYPOINT_ENV: Sandbox

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ANYPOINT_REPO_PASSWORD: ${{ secrets.CONNECTED_APP_CLIENT_ID }}~?~${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
      MAVEN_OPTS: >-
        --add-opens java.base/sun.net.www.protocol.jar=ALL-UNNAMED
        --add-opens java.base/java.net=ALL-UNNAMED
        --add-opens java.base/sun.net.www=ALL-UNNAMED

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Maven 3.8.6
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.8.6

      - name: Configure Maven settings for Anypoint Exchange
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>${ANYPOINT_REPO_PASSWORD}</password>
              </server>
              <server>
                <id>anypoint-exchange-v2</id>
                <username>~~~Client~~~</username>
                <password>${ANYPOINT_REPO_PASSWORD}</password>
              </server>
              <server>
                <id>mulesoft-releases</id>
                <username>~~~Client~~~</username>
                <password>${ANYPOINT_REPO_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build and Deploy to Anypoint Platform (CloudHub 2.0)
        run: |
          mvn clean deploy -DmuleDeploy -DskipTests \
            -Danypoint.client.id="${{ secrets.CONNECTED_APP_CLIENT_ID }}" \
            -Danypoint.client.secret="${{ secrets.CONNECTED_APP_CLIENT_SECRET }}" \
            -Danypoint.org="${{ env.ANYPOINT_ORG }}" \
            -Danypoint.env="${{ env.ANYPOINT_ENV }}" \
            --no-transfer-progress
