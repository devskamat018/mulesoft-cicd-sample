name: Deploy MuleSoft Application to Anypoint Platform

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ANYPOINT_ORG: 9316d463-75eb-4e74-955d-f242165464ce
  ANYPOINT_ENV: Sandbox
  APP_NAME: mulesoft-cicd-sample
  APP_RUNTIME: 4.9.0
  TARGET_ID: cloudhub-us-east-2
  GROUP_ID: 9316d463-75eb-4e74-955d-f242165464ce
  ARTIFACT_ID: mulesoft-cicd-sample
  VERSION: 2.1.0

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ANYPOINT_REPO_PASSWORD: ${{ secrets.CONNECTED_APP_CLIENT_ID }}~?~${{ secrets.CONNECTED_APP_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven settings for Anypoint Exchange
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS_EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>ANYPOINT_REPO_PASSWORD_PLACEHOLDER</password>
              </server>
              <server>
                <id>anypoint-exchange-v2</id>
                <username>~~~Client~~~</username>
                <password>ANYPOINT_REPO_PASSWORD_PLACEHOLDER</password>
              </server>
              <server>
                <id>mulesoft-releases</id>
                <username>~~~Client~~~</username>
                <password>ANYPOINT_REPO_PASSWORD_PLACEHOLDER</password>
              </server>
            </servers>
          </settings>
          SETTINGS_EOF
          sed -i "s|ANYPOINT_REPO_PASSWORD_PLACEHOLDER|${ANYPOINT_REPO_PASSWORD}|g" ~/.m2/settings.xml

      - name: Build and publish Mule application to Anypoint Exchange
        run: mvn clean deploy -DskipTests --no-transfer-progress

      - name: Install Anypoint CLI
        run: npm install -g anypoint-cli-v4

      - name: Deploy to CloudHub 2.0 via Anypoint CLI
        env:
          ANYPOINT_CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
        run: |
          # Step 1: Look up the app UUID by name
          echo "Looking up app UUID for: ${{ env.APP_NAME }}"
          APP_LIST=$(anypoint-cli-v4 runtime-mgr:application:list \
            --environment "${{ env.ANYPOINT_ENV }}" \
            --organization "${{ env.ANYPOINT_ORG }}" \
            --client_id "${ANYPOINT_CLIENT_ID}" \
            --client_secret "${ANYPOINT_CLIENT_SECRET}" \
            --output json 2>&1)

          echo "App list output: ${APP_LIST}"

          APP_UUID=$(echo "${APP_LIST}" | jq -r --arg name "${{ env.APP_NAME }}" \
            'if type == "array" then .[] elif .data then .data[] else empty end | select(.name == $name) | .id // empty' \
            2>/dev/null || true)

          echo "Found app UUID: ${APP_UUID}"

          if [ -n "${APP_UUID}" ]; then
            echo "App exists — updating with modify using UUID: ${APP_UUID}"
            anypoint-cli-v4 runtime-mgr:application:modify \
              "${APP_UUID}" \
              --artifactId "${{ env.ARTIFACT_ID }}" \
              --groupId "${{ env.GROUP_ID }}" \
              --assetVersion "${{ env.VERSION }}" \
              --replicaSize 0.1 \
              --replicas 1 \
              --runtimeVersion "${{ env.APP_RUNTIME }}" \
              --releaseChannel LTS \
              --environment "${{ env.ANYPOINT_ENV }}" \
              --organization "${{ env.ANYPOINT_ORG }}" \
              --client_id "${ANYPOINT_CLIENT_ID}" \
              --client_secret "${ANYPOINT_CLIENT_SECRET}"
          else
            echo "App does not exist — creating with deploy..."
            anypoint-cli-v4 runtime-mgr:application:deploy \
              "${{ env.APP_NAME }}" \
              "${{ env.TARGET_ID }}" \
              "${{ env.APP_RUNTIME }}" \
              "${{ env.ARTIFACT_ID }}" \
              --groupId "${{ env.GROUP_ID }}" \
              --assetVersion "${{ env.VERSION }}" \
              --replicaSize 0.1 \
              --replicas 1 \
              --releaseChannel LTS \
              --environment "${{ env.ANYPOINT_ENV }}" \
              --organization "${{ env.ANYPOINT_ORG }}" \
              --client_id "${ANYPOINT_CLIENT_ID}" \
              --client_secret "${ANYPOINT_CLIENT_SECRET}"

            # After fresh deploy, look up the UUID for the health check
            APP_LIST2=$(anypoint-cli-v4 runtime-mgr:application:list \
              --environment "${{ env.ANYPOINT_ENV }}" \
              --organization "${{ env.ANYPOINT_ORG }}" \
              --client_id "${ANYPOINT_CLIENT_ID}" \
              --client_secret "${ANYPOINT_CLIENT_SECRET}" \
              --output json 2>&1)
            APP_UUID=$(echo "${APP_LIST2}" | jq -r --arg name "${{ env.APP_NAME }}" \
              'if type == "array" then .[] elif .data then .data[] else empty end | select(.name == $name) | .id // empty' \
              2>/dev/null || true)
          fi

          # Step 3: Poll until app is RUNNING or timeout after 10 minutes
          echo "Waiting for application to reach RUNNING state..."
          MAX_ATTEMPTS=20
          SLEEP_SECONDS=30
          ATTEMPT=0
          STATUS=""

          while [ "${ATTEMPT}" -lt "${MAX_ATTEMPTS}" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Health check attempt ${ATTEMPT}/${MAX_ATTEMPTS}..."

            DESCRIBE_OUT=$(anypoint-cli-v4 runtime-mgr:application:describe \
              "${APP_UUID}" \
              --environment "${{ env.ANYPOINT_ENV }}" \
              --organization "${{ env.ANYPOINT_ORG }}" \
              --client_id "${ANYPOINT_CLIENT_ID}" \
              --client_secret "${ANYPOINT_CLIENT_SECRET}" \
              --output json 2>&1)

            echo "Describe output: ${DESCRIBE_OUT}"

            # Try jq with multiple possible field paths
            STATUS=$(echo "${DESCRIBE_OUT}" | jq -r '
              .status //
              .deploymentStatus //
              .application.status //
              .deployments[0].status //
              .currentDeployment.status //
              empty
            ' 2>/dev/null || true)

            # Fallback: grep raw output for known status strings
            if [ -z "${STATUS}" ]; then
              if echo "${DESCRIBE_OUT}" | grep -qi '"STARTED"'; then
                STATUS="STARTED"
              elif echo "${DESCRIBE_OUT}" | grep -qi '"RUNNING"'; then
                STATUS="RUNNING"
              elif echo "${DESCRIBE_OUT}" | grep -qi '"FAILED"'; then
                STATUS="FAILED"
              elif echo "${DESCRIBE_OUT}" | grep -qi '"DEPLOYING"'; then
                STATUS="DEPLOYING"
              fi
            fi

            echo "Current status: ${STATUS}"

            if [ "${STATUS}" = "RUNNING" ] || [ "${STATUS}" = "STARTED" ]; then
              echo "Application is ${STATUS} successfully!"
              break
            elif [ "${STATUS}" = "FAILED" ] || [ "${STATUS}" = "DEPLOYMENT_FAILED" ]; then
              echo "Application deployment FAILED!"
              exit 1
            fi

            if [ "${ATTEMPT}" -lt "${MAX_ATTEMPTS}" ]; then
              echo "Status is '${STATUS}' — waiting ${SLEEP_SECONDS}s before next check..."
              sleep ${SLEEP_SECONDS}
            fi
          done

          if [ "${STATUS}" != "RUNNING" ] && [ "${STATUS}" != "STARTED" ]; then
            echo "Timed out waiting for application to reach RUNNING/STARTED state. Last status: ${STATUS}"
            exit 1
          fi
